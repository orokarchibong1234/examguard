<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Exam - ExamGuard</title>
    <style>
            * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
            }
            body {
          font-family: 'Segoe UI', sans-serif;
          min-height: 100vh;
          color: #fff;
          position: relative;
          overflow-x: hidden;
          background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
      }
      body::before {
          content: '';
          position: fixed;
          top: 0; left: 0;
          width: 100%; height: 100%;
          background:transparent;
          pointer-events: none;
          z-index: 0;
      }
      .navbar, .container { position: relative; z-index: 1; }
              body::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image:
                  linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                  linear-gradient(
                    90deg,
                    rgba(0, 255, 255, 0.03) 1px,
                    transparent 1px
                  ),
                  linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0, 255, 255, 0.02) 1px, transparent 1px);
                background-size:
                  100px 100px,
                  100px 100px,
                  20px 20px,
                  20px 20px;
                background-position:
                  -1px -1px,
                  -1px -1px,
                  -1px -1px,
                  -1px -1px;
                pointer-events: none;
                z-index: 0;
                animation: gridMove 20s linear infinite;
              }
              body::after {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background:
                  radial-gradient(
                    circle at 10% 20%,
                    rgba(0, 100, 255, 0.08) 0%,
                    transparent 40%
                  ),
                  radial-gradient(
                    circle at 90% 80%,
                    rgba(0, 255, 200, 0.08) 0%,
                    transparent 40%
                  ),
                  radial-gradient(
                    circle at 50% 50%,
                    rgba(100, 0, 255, 0.05) 0%,
                    transparent 60%
                  );
                pointer-events: none;
                z-index: 0;
              }
              @keyframes gridMove {
                from {
                  background-position:
                    0 0,
                    0 0,
                    0 0,
                    0 0;
                }
                to {
                  background-position:
                    100px 100px,
                    100px 100px,
                    20px 20px,
                    20px 20px;
                }
              }
              .navbar,
              .container {
                position: relative;
                z-index: 1;
              }
            }
            .navbar {
              background: rgba(255, 255, 255, 0.05);
              backdrop-filter: blur(10px);
              border-bottom: 1px solid rgba(255, 255, 255, 0.1);
              padding: 15px 40px;
              display: flex;
              justify-content: space-between;
              align-items: center;
            }
            .navbar h1 {
              font-size: 20px;
              color: #4fc3f7;
            }
            .navbar .links {
              display: flex;
              gap: 15px;
              align-items: center;
            }
            .nav-link {
              color: rgba(255, 255, 255, 0.6);
              text-decoration: none;
              font-size: 14px;
              padding: 8px 16px;
              border-radius: 8px;
              transition: background 0.3s;
            }
            .nav-link:hover {
              background: rgba(255, 255, 255, 0.08);
              color: #fff;
            }
            .logout-btn {
              padding: 8px 16px;
              background: rgba(255, 80, 80, 0.2);
              border: 1px solid rgba(255, 80, 80, 0.4);
              border-radius: 8px;
              color: #ff6b6b;
              text-decoration: none;
              font-size: 13px;
            }
            .container {
              padding: 40px;
              max-width: 600px;
              margin: 0 auto;
            }
            .page-title {
              font-size: 24px;
              font-weight: 700;
              margin-bottom: 5px;
            }
            .page-subtitle {
              color: rgba(255, 255, 255, 0.5);
              font-size: 14px;
              margin-bottom: 30px;
            }
            .card {
              background: rgba(255, 255, 255, 0.05);
              border: 1px solid rgba(255, 255, 255, 0.1);
              border-radius: 15px;
              padding: 30px;
            }
            .form-group {
              margin-bottom: 20px;
            }
            label {
              display: block;
              color: rgba(255, 255, 255, 0.8);
              font-size: 13px;
              margin-bottom: 8px;
              font-weight: 500;
            }
            input,
            select {
              width: 100%;
              padding: 12px 16px;
              background: rgba(255, 255, 255, 0.08);
              border: 1px solid rgba(255, 255, 255, 0.15);
              border-radius: 10px;
              color: #fff;
              font-size: 14px;
              outline: none;
              transition: border 0.3s;
            }
            input:focus,
            select:focus {
              border-color: #4fc3f7;
            }
            input::placeholder {
              color: rgba(255, 255, 255, 0.3);
            }
            select option {
              background: #1a1a2e;
            }
            .btn-row {
              display: flex;
              gap: 15px;
              margin-top: 25px;
            }
            .btn {
              flex: 1;
              padding: 13px;
              border: none;
              border-radius: 10px;
              font-size: 14px;
              font-weight: 600;
              cursor: pointer;
              text-decoration: none;
              text-align: center;
              transition: opacity 0.3s;
            }
            .btn.primary {
              background: linear-gradient(135deg, #4fc3f7, #0288d1);
              color: #fff;
            }
            .btn.secondary {
              background: rgba(255, 255, 255, 0.08);
              color: rgba(255, 255, 255, 0.7);
            }
            .btn:hover {
              opacity: 0.9;
            }
    </style>
  </head>
  <body>
    <div class="navbar">
      <h1>🎓 ExamGuard</h1>
      <div class="links">
        <a href="/examiner" class="nav-link">📊 Monitor</a>
        <a href="/examiner/exams" class="nav-link">📋 Manage Exams</a>
        <a href="/logout" class="logout-btn">Logout</a>
      </div>
    </div>

    <div class="container">
      <div class="page-title">➕ Create New Exam</div>
      <div class="page-subtitle">Fill in the exam details below</div>

      <div class="card">
        <form method="POST">
          <div class="form-group">
            <label>Exam Title</label>
            <input
              type="text"
              name="title"
              placeholder="e.g. Introduction to Programming"
              required
            />
          </div>
          <div class="form-group">
            <label>Duration (minutes)</label>
            <select name="duration">
              <option value="15">15 minutes</option>
              <option value="30" selected>30 minutes</option>
              <option value="45">45 minutes</option>
              <option value="60">60 minutes</option>
              <option value="90">90 minutes</option>
              <option value="120">120 minutes</option>
            </select>
          </div>
          <div class="btn-row">
            <a href="/examiner/exams" class="btn secondary">Cancel</a>
            <button type="submit" class="btn primary">
              Next: Add Questions →
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
